<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CROICM</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .painel {
      width: 100vw;
      height: 100vh;
      background: white;
      padding: 2vh 4vw 4vh;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      max-width: 32vw;
      max-height: 18vh;
      width: auto;
      height: auto;
      margin-top: 1vh;
    }

    .frase {
      font-size: 2.4vw;
      line-height: 1.5;
      color: #222;
      max-width: 90vw;
      text-transform: uppercase;
      margin: 1vh auto;
      font-weight: 500;
    }

    .timer {
      font-size: 11vw;
      font-weight: bold;
      color: #666;
      margin: 1vh 0;
      letter-spacing: 0.4vw;
    }

    .botoes {
      display: flex;
      justify-content: center;
      gap: 1.2vw;
      flex-wrap: wrap;
      margin-bottom: 2vh;
    }

    button {
      border: none;
      border-radius: 25px;
      padding: 1.2vh 2vw;
      font-size: 1.6vw;
      cursor: pointer;
      min-width: 12vw;
      font-weight: 500;
    }

    .iniciar {
      background: #1db954;
      color: black;
    }

    .resetar {
      background: #e7c44b;
      color: black;
    }

    .pausar {
      background: #ff1e1e;
      color: black;
    }

    .tela {
      background: linear-gradient(90deg, #5a4bdb, #4f46e5);
      color: white;
    }

    @media (max-width: 900px) {
      .logo {
        max-width: 60vw;
        max-height: 16vh;
      }

      .frase {
        font-size: 4vw;
      }

      .timer {
        font-size: 20vw;
      }

      button {
        font-size: 4vw;
        min-width: 32vw;
        padding: 1.5vh 3vw;
      }
    }
  </style>
</head>

<body>

  <div class="painel">

    <img src="logo.png" alt="Logo da Igreja" class="logo">

    <div class="frase">
      NÃO ANDEIS ANSIOSOS POR COISA ALGUMA; ANTES EM TUDO SEJAM OS VOSSOS PEDIDOS
      CONHECIDOS DIANTE DE DEUS PELA ORAÇÃO E SÚPLICA, COM AÇÃO DE GRAÇAS.
      <br><br>
      — FILIPENSES 4:6-7
    </div>

    <div class="timer" id="timer">05:00</div>

    <div class="botoes">
      <button class="iniciar" onclick="iniciar()">Iniciar</button>
      <button class="resetar" onclick="resetar()">Resetar</button>
      <button class="pausar" onclick="pausar()">Pausar</button>
      <button class="tela" onclick="alternarTelaCheia()">Tela cheia</button>
    </div>

  </div>

  <script>
    let tempoRestante = 300;
    let intervalo = null;
    let alarmeTocando = false;

    function atualizarTimer() {
      const minutos = Math.floor(tempoRestante / 60);
      const segundos = tempoRestante % 60;

      const timer = document.getElementById("timer");

      timer.textContent =
        String(minutos).padStart(2, "0") + ":" +
        String(segundos).padStart(2, "0");

      if (tempoRestante <= 30) {
        timer.style.color = "red";
      } else {
        timer.style.color = "#666";
      }
    }

    function tocarAlarme() {
      if (alarmeTocando) return;
      alarmeTocando = true;

      const contexto = new (window.AudioContext || window.webkitAudioContext)();
      const duracao = 300;
      const pausa = 150;
      let repeticoes = 3;

      function beep(i) {
        if (i >= repeticoes) {
          alarmeTocando = false;
          return;
        }

        const oscilador = contexto.createOscillator();
        const ganho = contexto.createGain();

        oscilador.type = "sine";
        oscilador.frequency.setValueAtTime(880, contexto.currentTime);
        ganho.gain.setValueAtTime(0.2, contexto.currentTime);

        oscilador.connect(ganho);
        ganho.connect(contexto.destination);

        oscilador.start();

        setTimeout(() => {
          oscilador.stop();
          setTimeout(() => beep(i + 1), pausa);
        }, duracao);
      }

      beep(0);
    }

    function iniciar() {
      if (intervalo) return;

      intervalo = setInterval(() => {
        if (tempoRestante > 0) {
          tempoRestante--;
          atualizarTimer();

          if (tempoRestante === 0) {
            clearInterval(intervalo);
            intervalo = null;
            tocarAlarme();
          }
        }
      }, 1000);
    }

    function pausar() {
      clearInterval(intervalo);
      intervalo = null;
    }

    function resetar() {
      clearInterval(intervalo);
      intervalo = null;
      tempoRestante = 300;
      alarmeTocando = false;
      atualizarTimer();
    }

    function alternarTelaCheia() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    atualizarTimer();
  </script>

</body>
</html>

  </script>

</body>
</html>
