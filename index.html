<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CROICM</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .painel {
      width: 100vw;
      height: 100vh;
      padding: 2vh 4vw;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    .logo {
      max-width: 32vw;
      max-height: 18vh;
    }

    .frase {
      font-size: 2.4vw;
      max-width: 90vw;
      text-transform: uppercase;
      line-height: 1.5;
    }

    .timer {
      font-size: 11vw;
      font-weight: bold;
      color: #666;
    }

    .botoes {
      display: flex;
      gap: 1.2vw;
    }

    button {
      border: none;
      border-radius: 25px;
      padding: 1.2vh 2vw;
      font-size: 1.6vw;
      cursor: pointer;
      min-width: 12vw;
    }

    .iniciar { background: #1db954; }
    .resetar { background: #e7c44b; }
    .pausar { background: #ff1e1e; }
    .tela { background: #4f46e5; color: white; }
  </style>
</head>

<body>

<div class="painel">

  <img src="logo.png" class="logo">

  <div class="frase">
    NÃO ANDEIS ANSIOSOS POR COISA ALGUMA; ANTES EM TUDO SEJAM OS VOSSOS PEDIDOS
    CONHECIDOS DIANTE DE DEUS PELA ORAÇÃO E SÚPLICA, COM AÇÃO DE GRAÇAS.
    <br><br>
    — FILIPENSES 4:6-7
  </div>

  <div class="timer" id="timer">05:00</div>

  <div class="botoes">
    <button class="iniciar" onclick="iniciar()">Iniciar</button>
    <button class="resetar" onclick="resetar()">Resetar</button>
    <button class="pausar" onclick="pausar()">Pausar</button>
    <button class="tela" onclick="alternarTelaCheia()">Tela cheia</button>
  </div>

</div>

<script>
  let tempoRestante = 300;
  let intervalo = null;
  let alarmeTocando = false;
  let contextoAudio = null;

  function atualizarTimer() {
    const minutos = Math.floor(tempoRestante / 60);
    const segundos = tempoRestante % 60;

    const timer = document.getElementById("timer");

    timer.textContent =
      String(minutos).padStart(2, "0") + ":" +
      String(segundos).padStart(2, "0");

    timer.style.color = tempoRestante <= 30 ? "red" : "#666";
  }

  function tocarAlarme() {
    if (alarmeTocando || !contextoAudio) return;
    alarmeTocando = true;

    const duracao = 300;
    const pausa = 150;
    const repeticoes = 3;

    function beep(i) {
      if (i >= repeticoes) {
        alarmeTocando = false;
        return;
      }

      const osc = contextoAudio.createOscillator();
      const gain = contextoAudio.createGain();

      osc.frequency.value = 880;
      gain.gain.value = 0.3;

      osc.connect(gain);
      gain.connect(contextoAudio.destination);

      osc.start();

      setTimeout(() => {
        osc.stop();
        setTimeout(() => beep(i + 1), pausa);
      }, duracao);
    }

    beep(0);
  }

  function iniciar() {
    if (intervalo) return;

    // 🔊 Libera o áudio
    if (!contextoAudio) {
      contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
    }
    contextoAudio.resume();

    intervalo = setInterval(() => {
      if (tempoRestante > 0) {
        tempoRestante--;
        atualizarTimer();

        if (tempoRestante === 0) {
          clearInterval(intervalo);
          intervalo = null;
          tocarAlarme();
        }
      }
    }, 1000);
  }

  function pausar() {
    clearInterval(intervalo);
    intervalo = null;
  }

  function resetar() {
    clearInterval(intervalo);
    intervalo = null;
    tempoRestante = 300;
    alarmeTocando = false;
    atualizarTimer();
  }

  function alternarTelaCheia() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  atualizarTimer();
</script>

</body>
</html>
