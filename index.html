<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CROICM</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .painel {
      width: 95%;
      max-width: 950px;
      background: white;
      padding: 30px 20px 50px;
      text-align: center;
      border-radius: 6px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .logo {
      max-width: 400px;
      width: 100%;
      height: auto;
      margin-bottom: 20px;
    }

    .frase {
      font-size: 21px;
      line-height: 1.5;
      color: #222;
      max-width: 820px;
      margin: 0 auto 40px;
    }

    .timer {
      font-size: 130px;
      font-weight: bold;
      color: red;
      margin: 10px 0 35px;
      letter-spacing: 3px;
    }

    /* BOTÕES ESTILO DO PRINT */
    .botoes {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 25px;
      padding: 16px 30px;
      font-size: 22px;
      cursor: pointer;
      min-width: 160px;
      font-weight: 500;
    }

    .iniciar {
      background: #1db954;
      color: black;
    }

    .resetar {
      background: #e7c44b;
      color: black;
    }

    .pausar {
      background: #ff1e1e;
      color: black;
    }

    .tela {
      background: linear-gradient(90deg, #5a4bdb, #4f46e5);
      color: white;
    }

    @media (max-width: 700px) {
      .timer {
        font-size: 80px;
      }

      .frase {
        font-size: 16px;
      }

      button {
        font-size: 18px;
        min-width: 120px;
      }
    }

  </style>
</head>

<body>

  <div class="painel">

    <img src="logo.png" alt="Logo da Igreja" class="logo">

    <div class="frase">
      Não andeis ansiosos por coisa alguma; antes em tudo sejam os vossos pedidos
      conhecidos diante de Deus pela oração e súplica, com ação de graças.
      <br><br>
      — Filipenses 4:6-7
    </div>

    <div class="timer" id="timer">05:00</div>

    <div class="botoes">
      <button class="iniciar" onclick="iniciar()">Iniciar</button>
      <button class="resetar" onclick="resetar()">Resetar</button>
      <button class="pausar" onclick="pausar()">Pausar</button>
      <button class="tela" onclick="alternarTelaCheia()">Tela cheia</button>
    </div>

  </div>

  <script>
    let tempoRestante = 300;
    let intervalo = null;

    function atualizarTimer() {
      const minutos = Math.floor(tempoRestante / 60);
      const segundos = tempoRestante % 60;

      const timer = document.getElementById("timer");

      timer.textContent =
        String(minutos).padStart(2, "0") + ":" +
        String(segundos).padStart(2, "0");

      if (tempoRestante <= 30) {
        timer.style.color = "red";
      } else {
        timer.style.color = "#666";
      }
    }

    function iniciar() {
      if (intervalo) return;

      intervalo = setInterval(() => {
        if (tempoRestante > 0) {
          tempoRestante--;
          atualizarTimer();
        } else {
          clearInterval(intervalo);
          intervalo = null;
        }
      }, 1000);
    }

    function pausar() {
      clearInterval(intervalo);
      intervalo = null;
    }

    function resetar() {
      clearInterval(intervalo);
      intervalo = null;
      tempoRestante = 300;
      atualizarTimer();
    }

    function alternarTelaCheia() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    atualizarTimer();
  </script>

</body>
</html>
